<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Sistema de Asistencia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;min-width:0}
#root{max-width:100vw;overflow-x:hidden}
html,body{background:var(--bg);color:var(--ink);font-family:'Geist',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;max-width:100vw;width:100%}
:root{
  --bg:#F4F4F2;--canvas:#F8F8F6;--card:#FFFFFF;--ink:#0F0F0E;--ink-2:#3A3A37;
  --muted:#8C8A85;--line:rgba(15,15,14,.10);--line-2:rgba(15,15,14,.05);
  --accent:oklch(48% 0.09 152);--accent-soft:oklch(95% 0.025 152);
  --late:oklch(56% 0.16 28);--late-soft:oklch(95% 0.025 28);
  --over:oklch(62% 0.13 70);--over-soft:oklch(95% 0.04 70);
  --rest:oklch(60% 0.03 250);--rest-soft:oklch(95% 0.012 250);
}
.app{min-height:100vh;padding:8px;max-width:100%;margin:0 auto;overflow-x:hidden}
@media(min-width:700px){.app{padding:20px 40px 48px;max-width:1200px}}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 12px;gap:8px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
.brand-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px color-mix(in oklch,var(--accent) 18%,transparent);flex-shrink:0}
.topright{display:flex;align-items:center;gap:6px}
.nowclock{font-family:'Geist Mono',monospace;font-size:12px;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
.user-badge{display:flex;align-items:center;gap:5px;background:var(--canvas);border:1px solid var(--line);border-radius:8px;padding:4px 8px;font-size:11px}
.user-badge .logout-btn{appearance:none;border:0;background:transparent;cursor:pointer;font-size:11px;color:var(--muted);padding:0;font-family:inherit}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.sync-dot.syncing{background:var(--over);animation:pulse 1s infinite}
.sync-dot.error{background:var(--late)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grid{display:grid;grid-template-columns:1fr;gap:12px;align-items:start;max-width:100%;overflow:hidden}
@media(min-width:900px){.grid{grid-template-columns:minmax(0,1.4fr) minmax(0,1fr);gap:18px}}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;overflow:hidden;max-width:100%;width:100%}
@media(min-width:700px){.card{border-radius:18px;padding:22px 24px}}
.card-pad-tight{padding:12px 14px}
@media(min-width:700px){.card-pad-tight{padding:18px 20px}}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px;flex-wrap:wrap;min-width:0;overflow:hidden}
.card-title{font-size:10px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;color:var(--muted)}
.card-sub{font-size:10px;color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:500;border:1px solid var(--line)}
.pill .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.pill-ok{color:var(--accent);background:var(--accent-soft);border-color:transparent}
.pill-late{color:var(--late);background:var(--late-soft);border-color:transparent}
.pill-over{color:var(--over);background:var(--over-soft);border-color:transparent}
.pill-rest{color:var(--rest);background:var(--rest-soft);border-color:transparent}
.pill-ghost{color:var(--muted);background:transparent}
.today-left{display:flex;flex-direction:column;gap:10px;min-width:0;overflow:hidden;max-width:100%}
.today-date{font-size:11px;color:var(--muted);text-transform:capitalize}
.today-hero{display:flex;align-items:baseline;gap:8px}
.today-time{font-family:'Geist Mono',monospace;font-size:48px;font-weight:500;letter-spacing:-0.04em;line-height:1;color:var(--ink);font-variant-numeric:tabular-nums}
@media(min-width:700px){.today-time{font-size:68px}}
.today-secs{font-family:'Geist Mono',monospace;font-size:14px;color:var(--muted)}
.kvs{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;max-width:100%;overflow:hidden}
.kv-l{font-size:9px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase}
.kv-v{font-family:'Geist Mono',monospace;font-size:16px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums;margin-top:1px}
.kv-sub{font-size:9px;color:var(--muted);margin-top:1px}
.status-block{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;padding:11px 16px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;gap:8px;white-space:nowrap}
.btn-primary{background:var(--ink);color:var(--card)}
.btn-primary:hover{background:color-mix(in oklch,var(--ink),var(--accent) 30%)}
.btn-danger{background:var(--late);color:#fff}
.btn-ghost{background:transparent;color:var(--ink-2);border:1px solid var(--line)}
.btn-ghost:hover{background:var(--line-2)}
.timeline{margin-top:8px;max-width:100%;overflow:hidden}
.timeline-track{position:relative;height:5px;background:var(--line-2);border-radius:99px;overflow:visible}
.timeline-seg{position:absolute;top:0;bottom:0;border-radius:99px}
.timeline-seg.work{background:var(--accent)}
.timeline-seg.lunch{background:var(--rest)}
.timeline-seg.over{background:var(--over)}
.timeline-now{position:absolute;top:-5px;bottom:-5px;width:2px;background:var(--ink);border-radius:2px}
.timeline-now::after{content:'';position:absolute;top:-3px;left:-3px;width:7px;height:7px;border-radius:50%;background:var(--ink)}
.timeline-ticks{display:flex;justify-content:space-between;margin-top:5px;font-family:'Geist Mono',monospace;font-size:8px;color:var(--muted)}
.week-summary{display:flex;align-items:center;justify-content:space-between;gap:8px;padding-top:10px;border-top:1px solid var(--line-2);flex-wrap:wrap;overflow:hidden;max-width:100%}
.week-total{display:flex;align-items:baseline;gap:6px;flex-shrink:0}
.week-total .big{font-family:'Geist Mono',monospace;font-size:26px;font-weight:500;letter-spacing:-0.03em;color:var(--ink)}
@media(min-width:700px){.week-total .big{font-size:34px}}
.week-total .small{color:var(--muted);font-family:'Geist Mono',monospace;font-size:13px}
.week-prog{height:5px;background:var(--line-2);border-radius:99px;overflow:hidden;flex:1;min-width:0;align-self:center}
.week-prog-fill{height:100%;background:var(--accent);border-radius:99px}
.week-prog-over{height:100%;background:var(--over)}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px}
.cal-h{font-size:8px;color:var(--muted);text-align:center;padding:3px 0;letter-spacing:0.02em;text-transform:uppercase}
.cal-cell{min-height:44px;border-radius:7px;background:var(--canvas);border:1px solid transparent;padding:4px 5px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:transform .08s ease;min-width:0}
@media(min-width:700px){.cal-cell{min-height:56px;padding:6px 8px;border-radius:10px}}
.cal-cell:hover{border-color:var(--line);transform:translateY(-1px)}
.cal-cell.muted{opacity:.32;cursor:default}
.cal-cell.muted:hover{transform:none;border-color:transparent}
.cal-cell.weekend{background:transparent;border-color:var(--line-2);cursor:default}
.cal-cell.weekend:hover{transform:none}
.cal-cell.today{border:1.5px solid var(--ink)}
.cal-cell.selected{border:1.5px solid var(--accent);background:var(--accent-soft)}
.cal-cell.holiday{background:var(--rest-soft)}
.cal-day{font-family:'Geist Mono',monospace;font-size:10px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums}
@media(min-width:700px){.cal-day{font-size:13px}}
.cal-cell.muted .cal-day{color:var(--muted)}
.cal-marks{display:flex;gap:2px;align-items:center}
.cal-mark{width:4px;height:4px;border-radius:50%}
.cal-mark.ok{background:var(--accent)}
.cal-mark.late{background:var(--late)}
.cal-mark.over{background:var(--over)}
.cal-mark.rest{background:var(--rest);opacity:.7}
.cal-hours{font-family:'Geist Mono',monospace;font-size:7px;color:var(--muted);text-align:right;line-height:1}
@media(min-width:700px){.cal-hours{font-size:9px}}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
.stat-l{font-size:9px;color:var(--muted);letter-spacing:0.04em;text-transform:uppercase}
.stat-v{font-family:'Geist Mono',monospace;font-size:18px;font-weight:500;color:var(--ink);margin-top:2px}
.stat-v.accent{color:var(--accent)}
.stat-v.late{color:var(--late)}
.stat-v.over{color:var(--over)}
.stat-sub{font-size:9px;color:var(--muted);margin-top:1px;font-family:'Geist Mono',monospace}
.hist-table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.hist-table th{text-align:left;font-weight:500;font-size:9px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);padding:7px 8px;border-bottom:1px solid var(--line-2)}
.hist-table td{padding:10px 8px;border-bottom:1px solid var(--line-2);color:var(--ink);vertical-align:middle}
.hist-table tr:last-child td{border-bottom:0}
.hist-table tbody tr{cursor:pointer;transition:background .12s ease}
.hist-table tbody tr:hover{background:var(--line-2)}
.hist-table .right{text-align:right}
.hist-date{display:flex;align-items:center;gap:6px}
.hist-date .dnum{font-family:'Geist Mono',monospace;font-weight:500;min-width:20px;color:var(--ink)}
.hist-date .dname{color:var(--muted);font-size:10px;text-transform:capitalize}
.hist-time{font-family:'Geist Mono',monospace;font-size:11px;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
.modal-bg{position:fixed;inset:0;background:rgba(20,18,14,.4);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:fadeIn .15s ease;padding:12px}
.modal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.modal-head{display:flex;align-items:start;justify-content:space-between;margin-bottom:12px}
.modal h2{margin:0;font-size:17px;font-weight:500;letter-spacing:-0.02em;text-transform:capitalize}
.modal h2 small{display:block;font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none;margin-top:1px}
.modal-x{appearance:none;border:0;background:var(--line-2);width:26px;height:26px;border-radius:7px;cursor:pointer;color:var(--ink-2);font-size:13px;flex-shrink:0}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.modal-stat{background:var(--canvas);border-radius:9px;padding:7px 10px}
.modal-stat .l{font-size:9px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase}
.modal-stat .v{font-family:'Geist Mono',monospace;font-size:15px;color:var(--ink);margin-top:2px}
.modal-stat .v.late{color:var(--late)}
.modal-stat .v.over{color:var(--over)}
.modal-section{margin-bottom:10px}
.modal-section h3{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:0 0 6px 0}
.time-inputs{display:flex;gap:8px}
.time-input{flex:1;background:var(--canvas);border:1px solid var(--line-2);border-radius:8px;padding:8px 10px;font-family:'Geist Mono',monospace;font-size:14px;color:var(--ink);width:100%}
.time-input:focus{outline:none;border-color:var(--accent)}
.note-input{width:100%;background:var(--canvas);border:1px solid var(--line-2);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:12px;color:var(--ink);resize:vertical;min-height:52px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid var(--line-2)}
.seg{display:inline-flex;background:var(--canvas);border-radius:7px;padding:2px;gap:1px}
.seg button{appearance:none;border:0;background:transparent;padding:4px 7px;border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.seg button.active{background:var(--card);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.05)}
.status-block{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.export-wrap{position:relative}
.export-menu{position:absolute;top:calc(100% + 6px);right:0;min-width:200px;z-index:500;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:5px;box-shadow:0 14px 40px rgba(0,0,0,.10);display:flex;flex-direction:column;gap:1px;animation:popIn .12s ease}
.export-menu .export-section{font-size:9px;font-weight:600;letter-spacing:0.10em;text-transform:uppercase;color:var(--muted);padding:6px 8px 3px}
.export-menu button{appearance:none;border:0;background:transparent;display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:7px;font-family:inherit;font-size:12px;color:var(--ink);cursor:pointer;text-align:left;width:100%}
.export-menu button:hover{background:var(--line-2)}
.export-menu .ext{font-family:'Geist Mono',monospace;font-size:10px;color:var(--muted)}
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px}
.login-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.12)}
.login-box h2{margin:0 0 4px;font-size:20px;font-weight:600;letter-spacing:-0.02em;color:var(--ink)}
.login-box p{margin:0 0 18px;font-size:12px;color:var(--muted)}
.login-box label{display:block;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.login-box input{width:100%;background:var(--canvas);border:1px solid var(--line-2);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--ink);margin-bottom:10px}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box .login-btn{appearance:none;border:0;background:var(--ink);color:var(--card);border-radius:10px;padding:12px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:4px}
.login-box .login-err{font-size:11px;color:var(--late);margin-top:-6px;margin-bottom:8px}
.login-box .login-sep{border:0;border-top:1px solid var(--line-2);margin:14px 0}
.login-box .register-link{font-size:12px;color:var(--muted);text-align:center;cursor:pointer}
.login-box .register-link span{color:var(--accent);text-decoration:underline;cursor:pointer}
.config-notice{position:fixed;inset:0;background:#0F0F0E;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'Geist',sans-serif;padding:16px}
.config-box{background:#1D1D1B;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:24px;max-width:500px;width:100%}
.config-box h1{margin:0 0 8px;font-size:20px;color:#F2F1ED;font-weight:600}
.config-box p{margin:0 0 14px;font-size:13px;color:#7E7C77;line-height:1.6}
.config-box input{width:100%;background:#0F0F0E;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:10px 12px;font-family:'Geist Mono',monospace;font-size:13px;color:#F2F1ED;margin-bottom:8px}
.config-box button{background:#F2F1ED;color:#0F0F0E;border:0;border-radius:8px;padding:10px 20px;font-family:'Geist',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%}
.config-box .hint{font-size:11px;color:#7E7C77;margin-top:8px;line-height:1.5}
@media print{
  @page{size:A4;margin:14mm}
  body{background:#fff!important}
  .export-wrap,.modal-bg,.btn-primary,.btn-danger,.seg,.user-badge{display:none!important}
  .app{padding:0;max-width:none}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc!important;margin-bottom:10px}
  .grid{grid-template-columns:1fr!important}
  button{display:none!important}
}
</style>
</head>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── Supabase client ──────────────────────────────────────────
let supabase = null;
const getSupabase = () => {
  if (!isConfigured) return null;
  if (supabase) return supabase;
  const lib = window.supabase || window.Supabase;
  if (lib && lib.createClient) {
    supabase = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    return supabase;
  }
  return null;
};

// ── Time helpers ─────────────────────────────────────────────
const parseHM = (s) => { if (!s) return null; const [h,m]=String(s).split(':').map(Number); return (h||0)*60+(m||0); };
const fmtHM   = (mins) => { if(mins==null)return'—'; const m=Math.max(0,Math.round(mins)); return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`; };
const fmtHrs  = (mins,opts={}) => { if(mins==null)return'—'; const m=Math.max(0,Math.round(mins)); const h=Math.floor(m/60); const mm=m%60; if(opts.short&&h===0)return`${mm} min`; return`${h}h ${String(mm).padStart(2,'0')}m`; };
const DAY_SHORT  = ['dom','lun','mar','mié','jue','vie','sáb'];
const DAY_FULL   = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTH_FULL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const dateKey  = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fromKey  = (k) => { const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); };
const isWeekend= (d) => d.getDay()===0||d.getDay()===6;
const weekStart= (d) => { const dow=d.getDay(); const diff=dow===0?-6:1-dow; return new Date(d.getFullYear(),d.getMonth(),d.getDate()+diff); };

// ── Feriados Perú ─────────────────────────────────────────
const FERIADOS_PERU = (year) => {
  // Feriados fijos Perú (basados en calendario oficial 2026)
  const fixed = [
    `${year}-01-01`, // Año Nuevo
    `${year}-05-01`, // Día del Trabajo
    `${year}-06-29`, // San Pedro y San Pablo
    `${year}-07-23`, // Día de la Fuerza Aérea del Perú
    `${year}-07-28`, // Fiestas Patrias
    `${year}-07-29`, // Fiestas Patrias
    `${year}-08-06`, // Batalla de Junín
    `${year}-08-30`, // Santa Rosa de Lima
    `${year}-10-08`, // Combate de Angamos
    `${year}-11-01`, // Todos los Santos
    `${year}-12-08`, // Inmaculada Concepción
    `${year}-12-09`, // Batalla de Ayacucho
    `${year}-12-25`, // Navidad
  ];
  // Semana Santa (variable por año)
  const easter = getEaster(year);
  const viernesSanto = new Date(easter); viernesSanto.setDate(easter.getDate()-2);
  const juevesSanto = new Date(easter); juevesSanto.setDate(easter.getDate()-3);
  fixed.push(dateKey(juevesSanto));
  fixed.push(dateKey(viernesSanto));
  return new Set(fixed);
};
const getEaster = (year) => {
  const a=year%19,b=Math.floor(year/100),c=year%100,d=Math.floor(b/4),e=b%4,
    f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,
    i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,
    m=Math.floor((a+11*h+22*l)/451),
    month=Math.floor((h+l-7*m+114)/31),
    day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
};
const isHolidayPeru = (dateObj) => {
  const feriados = FERIADOS_PERU(dateObj.getFullYear());
  return feriados.has(dateKey(dateObj));
};
const isWorkday = (dateObj) => !isWeekend(dateObj) && !isHolidayPeru(dateObj);

// Días laborables en un mes
const workdaysInMonth = (year, monthIdx) => {
  const last = new Date(year, monthIdx+1, 0).getDate();
  let count = 0;
  for(let d=1; d<=last; d++){
    const date = new Date(year, monthIdx, d);
    if(isWorkday(date)) count++;
  }
  return count;
};

// Días laborables hasta hoy (inclusive) en un mes
const workdaysToDate = (year, monthIdx, todayKey) => {
  const last = new Date(year, monthIdx+1, 0).getDate();
  let count = 0;
  for(let d=1; d<=last; d++){
    const date = new Date(year, monthIdx, d);
    const k = dateKey(date);
    if(k > todayKey) break;
    if(isWorkday(date)) count++;
  }
  return count;
};

// Días laborables en la semana actual
const workdaysInWeek = (weekStartDate) => {
  let count = 0;
  for(let i=0; i<7; i++){
    const d = new Date(weekStartDate.getFullYear(), weekStartDate.getMonth(), weekStartDate.getDate()+i);
    if(isWorkday(d)) count++;
  }
  return count;
};

// ── Domain calc ──────────────────────────────────────────────
function calcDay(rec,cfg,nowMin=null){
  if(!rec||rec.holiday)return null;
  const sStart=parseHM(cfg.scheduleStart); const sEnd=parseHM(cfg.scheduleEnd); const lunch=cfg.lunchMin;
  const lunchStart=sStart+Math.floor((sEnd-sStart-lunch)/2); const lunchEnd=lunchStart+lunch;
  const expected=sEnd-sStart-lunch;
  const entry=rec.entry; const exitRaw=rec.exit; const inProgress=exitRaw==null;
  const exit=inProgress?nowMin:exitRaw;
  if(entry==null||exit==null)return null;
  const tard=Math.max(0,entry-sStart); const scheduledExit=sEnd+tard; const onSite=Math.max(0,exit-entry);
  const lunchDeduct=inProgress&&exit<lunchEnd?Math.max(0,exit-lunchStart):lunch;
  const worked=Math.max(0,onSite-lunchDeduct); const dailyOver=Math.max(0,exit-scheduledExit);
  return{entry,exit,exitRaw,inProgress,tard,scheduledExit,onSite,worked,dailyOver,expected,lunchStart,lunchEnd,lunchDeduct,note:rec.note};
}

function calcWeek(records,anchor,cfg,nowMin){
  const start=weekStart(anchor); const days=[]; let totalWorked=0,totalTard=0,totalDailyOver=0,daysWorked=0;
  for(let i=0;i<7;i++){
    const d=new Date(start.getFullYear(),start.getMonth(),start.getDate()+i);
    const k=dateKey(d); const rec=records[k]; const calc=calcDay(rec,cfg,nowMin);
    days.push({date:d,key:k,rec,calc});
    if(calc){totalWorked+=calc.worked;totalTard+=calc.tard;totalDailyOver+=calc.dailyOver;if(calc.worked>0)daysWorked++;}
  }
  const goal=cfg.weeklyGoal*60; const weeklyOver=Math.max(0,totalWorked-goal);
  return{start,days,totalWorked,totalTard,totalDailyOver,weeklyOver,daysWorked,goal};
}

function calcMonth(records,year,monthIdx,cfg,nowMin,todayKey){
  let totalWorked=0,totalTard=0,totalOver=0,daysWorked=0;
  const goalDaily=parseHM(cfg.scheduleEnd)-parseHM(cfg.scheduleStart)-cfg.lunchMin; // minutos reales del horario
  // Meta total del mes = días laborables del mes * 9h
  const totalWorkdays=workdaysInMonth(year,monthIdx);
  const goalMonth=totalWorkdays*goalDaily;
  // Meta a la fecha = días laborables hasta hoy * 9h
  const workdaysHoy=workdaysToDate(year,monthIdx,todayKey);
  const goalToDate=workdaysHoy*goalDaily;
  for(const[k,rec]of Object.entries(records)){
    const d=fromKey(k); if(d.getFullYear()!==year||d.getMonth()!==monthIdx)continue;
    const calc=rec?calcDay(rec,cfg,nowMin):null;
    if(calc){
      totalWorked+=calc.worked;
      totalTard+=calc.tard;
      if(calc.worked>0)daysWorked++;
      totalOver+=Math.max(0,calc.worked-goalDaily);
    }
  }
  return{totalWorked,totalTard,totalOver,daysWorked,goalToDate,goalMonth,totalWorkdays,workdaysHoy};
}

// ── LOGIN SCREEN ─────────────────────────────────────────────
function LoginScreen({onLogin}){
  const [mode,setMode]=useState('login'); // 'login' | 'register'
  const [name,setName]=useState('');
  const [email,setEmail]=useState('');
  const [password,setPassword]=useState('');
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);

  const handle=async()=>{
    setError(''); setLoading(true);
    try{
      if(mode==='register'){
        const{data,error:err}=await supabase.auth.signUp({email,password,options:{data:{full_name:name}}});
        if(err)throw err;
        if(data.user) onLogin(data.user);
      } else {
        const{data,error:err}=await supabase.auth.signInWithPassword({email,password});
        if(err)throw err;
        onLogin(data.user);
      }
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  return(
    <div className="login-screen">
      <div className="login-box">
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20}}>
          <div className="brand-dot"/>
          <span style={{fontWeight:600,fontSize:15}}>Sistema de Asistencia</span>
        </div>
        <h2>{mode==='login'?'Iniciar sesión':'Crear cuenta'}</h2>
        <p>{mode==='login'?'Ingresa con tu cuenta de empleado':'Regístrate con tu correo corporativo'}</p>
        {mode==='register'&&(
          <>
            <label>Nombre completo</label>
            <input type="text" placeholder="Juan Pérez" value={name} onChange={e=>setName(e.target.value)}/>
          </>
        )}
        <label>Correo electrónico</label>
        <input type="email" placeholder="juan@empresa.com" value={email} onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handle()}/>
        <label>Contraseña</label>
        <input type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handle()}/>
        {error&&<div className="login-err">⚠ {error}</div>}
        <button className="login-btn" onClick={handle} disabled={loading}>
          {loading?'Procesando...':(mode==='login'?'Entrar':'Registrarme')}
        </button>
        <hr className="login-sep"/>
        <div className="register-link">
          {mode==='login'?<>¿No tienes cuenta? <span onClick={()=>setMode('register')}>Regístrate</span></>
                        :<>¿Ya tienes cuenta? <span onClick={()=>setMode('login')}>Inicia sesión</span></>}
        </div>
      </div>
    </div>
  );
}

                  strokeWidth="10" strokeLinecap="round"

              <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>

                <div style={{fontFamily:'Geist Mono,monospace',fontSize:28,fontWeight:500,color:'var(--ink)',letterSpacing:'-0.02em'}}>{progress}%</div>
                <div style={{fontFamily:'Geist Mono,monospace',fontSize:9,color:'var(--muted)'}}>{todayCalc?fmtHrs(todayCalc.worked,{short:true}):'—'} / {fmtHrs(todayCalc?.expected||480,{short:true})}</div>

              {!hasEntry&&<button className="btn btn-primary" style={{width:'100%'}} onClick={onMarkEntry}>▶ Marcar entrada</button>}
              {hasEntry&&!hasExit&&<button className="btn btn-danger" style={{width:'100%'}} onClick={onMarkExit}>■ Marcar salida</button>}
              {hasEntry&&!hasExit&&<button className="btn btn-ghost" style={{width:'100%'}} onClick={onSalidaAnticipada}>↙ Salida anticipada</button>}
              {hasExit&&<button className="btn btn-ghost" style={{width:'100%'}} onClick={onUndoExit}>↩ Deshacer salida</button>}
              <button className="btn btn-ghost" style={{width:'100%'}} onClick={onVacaciones}>🏖 Vacaciones</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── WEEK CARD ─────────────────────────────────────────────────
function WeekCard({week,cfg}){
  const goal=cfg.weeklyGoal*60;
  const pct=Math.min(100,(week.totalWorked/goal)*100);
  const over=week.totalWorked>goal;
  const wdCount=workdaysInWeek(week.start);
  const weekGoalHrs=Math.round(wdCount*(parseHM(cfg.scheduleEnd)-parseHM(cfg.scheduleStart)-cfg.lunchMin)/60*100)/100;
  const weekGoalMin=wdCount*(parseHM(cfg.scheduleEnd)-parseHM(cfg.scheduleStart)-cfg.lunchMin);
  const pctReal=Math.min(100,(week.totalWorked/weekGoalMin)*100);
  return(
    <div style={{background:'var(--card)',border:'1px solid var(--line)',borderRadius:14,padding:window.innerWidth<700?'8px 6px':'18px 20px',overflow:'hidden'}}>
      <div className="card-head">

      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:8,height:window.innerWidth<700?90:130,padding:0,width:'100%'}}>
        {week.days.map(({date,key,calc})=>{
          const isToday=dateKey(new Date())===key; const isFuture=date>new Date()&&!isToday;
          const goalDailyMin=parseHM(cfg.scheduleEnd)-parseHM(cfg.scheduleStart)-cfg.lunchMin; const barH=isFuture?0:calc?Math.min(100,(calc.worked/goalDailyMin)*100):0;
          return(
            <div key={key} style={{display:'flex',flexDirection:'column',alignItems:'stretch',gap:3,height:'100%',minWidth:0}}>
              <div style={{flex:1,minHeight:0,background:'var(--line-2)',borderRadius:5,position:'relative',overflow:'hidden',outline:isToday?'2px solid var(--ink)':undefined,outlineOffset:isToday?2:undefined}}>
                <div style={{position:'absolute',left:0,right:0,bottom:0,borderRadius:5,transition:'height .4s ease',height:`${barH}%`,background:isFuture?'transparent':calc?.tard>0?'var(--late)':calc?.dailyOver>0?'var(--over)':'var(--accent)',backgroundImage:isFuture?'repeating-linear-gradient(45deg,var(--line-2) 0 3px,transparent 3px 6px)':undefined}}/>
              </div>
              <div style={{fontSize:8,color:'var(--muted)',textTransform:'uppercase',textAlign:'center',letterSpacing:0}}>{DAY_SHORT[date.getDay()]}</div>
              <div style={{fontFamily:'Geist Mono,monospace',fontSize:8,color:'var(--ink-2)',textAlign:'center'}}>{date.getDate()}</div>
            </div>
          );
        })}
      </div>
      <div className="week-summary">
        <div className="week-total">
          <span className="big">{fmtHrs(week.totalWorked,{short:true})}</span>
          <span className="small">/ {weekGoalHrs}h</span>
        </div>
        <div className="week-prog">
          {week.totalWorked>=weekGoalMin
            ?<div className="week-prog-over" style={{width:'100%'}}/>

        </div>
        {week.totalWorked>=weekGoalMin
          ?<span className="pill pill-ok"><span className="dot"/>✓ Meta</span>
          :<span style={{fontSize:11,color:'var(--muted)',fontFamily:'Geist Mono,monospace',whiteSpace:'nowrap'}}>{Math.round(pctReal)}%</span>}

      <div style={{display:'flex',gap:16,marginTop:12,paddingTop:12,borderTop:'1px solid var(--line-2)',flexWrap:'wrap'}}>

// ── MONTH CALENDAR ────────────────────────────────────────────
function MonthCalendar({records,cfg,nowMin,todayKey,viewMonth,onSetViewMonth,onPick,selected}){
  const {y,m}=viewMonth;
  const first=new Date(y,m,1); const lastDay=new Date(y,m+1,0).getDate();
  const startDow=first.getDay()===0?6:first.getDay()-1;
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=lastDay;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const prevMonth=()=>onSetViewMonth(m===0?{y:y-1,m:11}:{y,m:m-1});
  const nextMonth=()=>onSetViewMonth(m===11?{y:y+1,m:0}:{y,m:m+1});
  return(
    <div className="card card-pad-tight">
      <div className="card-head">
        <button className="btn btn-ghost" style={{padding:'4px 10px',fontSize:13}} onClick={prevMonth}>‹</button>
        <div className="card-title">{MONTH_FULL[m]} {y}</div>
        <button className="btn btn-ghost" style={{padding:'4px 10px',fontSize:13}} onClick={nextMonth}>›</button>
      </div>
      <div className="cal-grid">
        {['lun','mar','mié','jue','vie','sáb','dom'].map(d=><div key={d} className="cal-h">{d}</div>)}
        {cells.map((d,i)=>{
          if(!d)return<div key={i}/>;
          const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const date=fromKey(k); const rec=records[k]; const calc=calcDay(rec,cfg,nowMin);
          const isWE=isWeekend(date); const isToday=k===todayKey; const isSel=k===selected;
          const cls=['cal-cell',isWE?'weekend':'',isToday?'today':'',isSel?'selected':'',rec?.holiday?'holiday':''].filter(Boolean).join(' ');
          return(
            <div key={k} className={cls} onClick={()=>!isWE&&onPick(k)}>
              <div className="cal-day">{d}</div>
              <div>
                <div className="cal-marks">
                  {rec?.holiday&&<span className="cal-mark rest"/>}
                  {rec?.vacacion&&<span className="cal-mark" style={{background:'#378ADD'}}/>}
                  {calc&&!rec?.vacacion&&calc.tard>0&&<span className="cal-mark late"/>}
                  {calc&&!rec?.vacacion&&calc.dailyOver>0&&<span className="cal-mark over"/>}
                  {calc&&!rec?.vacacion&&calc.tard===0&&<span className="cal-mark ok"/>}
                </div>
                {calc&&<div className="cal-hours">{fmtHrs(calc.worked,{short:true})}</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── HISTORY TABLE ─────────────────────────────────────────────
function HistoryCard({records,cfg,nowMin,todayKey,filter,onFilter,anchor,month,onPick}){
  const entries=useMemo(()=>{
    const all=Object.entries(records).map(([k,rec])=>({k,rec,date:fromKey(k)})).sort((a,b)=>b.k.localeCompare(a.k));
    if(filter==='week'){const ws=weekStart(anchor);const we=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()+7);return all.filter(({date})=>date>=ws&&date<we);}
    if(filter==='month'){return all.filter(({date})=>date.getFullYear()===month.y&&date.getMonth()===month.m);}
    return all;
  },[records,filter,anchor,month]);
  return(
    <div className="card">
      <div className="card-head">
        <div className="card-title">Historial</div>
        <div className="seg">
          <button className={filter==='week'?'active':''} onClick={()=>onFilter('week')}>Semana</button>
          <button className={filter==='month'?'active':''} onClick={()=>onFilter('month')}>Mes</button>
          <button className={filter==='all'?'active':''} onClick={()=>onFilter('all')}>Todo</button>
        </div>
      </div>
      <div style={{overflowX:"auto",width:"100%",WebkitOverflowScrolling:"touch"}}><table className="hist-table" style={{minWidth:480}}>
        <thead><tr><th>Fecha</th><th>Entrada</th><th>Salida</th><th className="right">Trabajadas</th><th className="right">Tardanza</th><th className="right">Extras</th><th>Nota</th></tr></thead>
        <tbody>
          {entries.length===0&&<tr><td colSpan={7} style={{color:'var(--muted)',padding:'24px 12px',textAlign:'center'}}>Sin registros</td></tr>}
          {entries.map(({k,rec,date})=>{
            const calc=calcDay(rec,cfg,nowMin);
            return(
              <tr key={k} onClick={()=>onPick(k)}>
                <td><div className="hist-date"><span className="dnum">{String(date.getDate()).padStart(2,'0')}</span><span className="dname">{DAY_SHORT[date.getDay()]} {MONTH_FULL[date.getMonth()].slice(0,3)}</span>{k===todayKey&&<span style={{background:'var(--accent-soft)',color:'var(--accent)',borderRadius:4,fontSize:9,padding:'1px 5px',fontWeight:600,marginLeft:4,verticalAlign:'middle',whiteSpace:'nowrap'}}>hoy</span>}</div></td>
                {rec.holiday?<td colSpan={5}><span className="pill pill-rest"><span className="dot"/>{rec.holiday}</span></td>:(
                  <>
                    <td className="hist-time">{rec.entry!=null?fmtHM(rec.entry):'—'}</td>
                    <td className="hist-time">{rec.exit!=null?fmtHM(rec.exit):<span style={{color:'var(--muted)'}}>en curso</span>}</td>
                    <td className="right hist-time">{calc?fmtHrs(calc.worked,{short:true}):'—'}</td>
                    <td className="right hist-time" style={{color:calc?.tard>0?'var(--late)':'var(--muted)'}}>{calc?.tard>0?`+${fmtHrs(calc.tard,{short:true})}`:'—'}</td>
                    <td className="right hist-time" style={{color:calc?.dailyOver>0?'var(--over)':'var(--muted)'}}>{calc?.dailyOver>0?`+${fmtHrs(calc.dailyOver,{short:true})}`:'—'}</td>
                  </>
                )}
                {!rec.holiday&&<td style={{color:'var(--muted)',fontSize:12,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rec.note||''}</td>}
              </tr>
            );
          })}
        </tbody>
      </table></div>
    </div>
  );
}

// ── DAY DETAIL MODAL ──────────────────────────────────────────

  const date=fromKey(dk); const calc=rec?calcDay(rec,cfg,nowMin):null;
  const isFeriado=isHolidayPeru(date);
  const isFuturo=dk>todayKey;
  const[entry,setEntry]=useState(rec?.entry!=null?fmtHM(rec.entry):'');
  const[exit,setExit]=useState(rec?.exit!=null?fmtHM(rec.exit):'');
  const[note,setNote]=useState(rec?.note||'');
  useEffect(()=>{
    setEntry(rec?.entry!=null?fmtHM(rec.entry):'');
    setExit(rec?.exit!=null?fmtHM(rec.exit):'');
    setNote(rec?.note||'');

    </div>
  );

// ── SALIDA ANTICIPADA MODAL ──────────────────────────────────
function SalidaAnticipadaModal({cfg, nowMin, onClose, onSave}){
  const [salidaHora, setSalidaHora] = React.useState(fmtHM(nowMin));
  const [motivo, setMotivo] = React.useState('');
  const [detalle, setDetalle] = React.useState('');
  const MOTIVOS = ['Médico','Familiar','Trámite','Capacitación','Otro'];
  
  const salidaNormalMin = parseHM(cfg.scheduleEnd);
  const salidaMin = parseHM(salidaHora);
  const faltaMin = salidaNormalMin - (salidaMin||0);
  
  const save = () => {
    if(!salidaHora||!motivo) return;
    onSave({exit: salidaMin, earlyExit: true, earlyExitMotivo: motivo, earlyExitDetalle: detalle, note: `Salida anticipada: ${motivo}${detalle?' - '+detalle:''}`});
    onClose();
  };
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2>Salida anticipada<small>Registra tu salida antes de hora</small></h2>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <div style={{flex:1,background:'var(--canvas)',borderRadius:10,padding:'8px 12px'}}>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Hora normal</div>
            <div style={{fontFamily:'Geist Mono,monospace',fontSize:20,fontWeight:500,color:'var(--ink)',marginTop:2}}>{cfg.scheduleEnd}</div>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:10,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>Salgo a las</div>
            <input className="time-input" type="time" value={salidaHora} onChange={e=>setSalidaHora(e.target.value)}/>
          </div>
        </div>
        {faltaMin>0&&<div style={{background:'var(--over-soft)',border:'1px solid var(--over)',borderRadius:10,padding:'8px 12px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--over)'}}>Tiempo que faltará</span>
          <span style={{fontFamily:'Geist Mono,monospace',fontSize:16,fontWeight:500,color:'var(--over)'}}>-{fmtHrs(faltaMin,{short:true})}</span>
        </div>}
        {faltaMin<=0&&salidaHora&&<div style={{background:'var(--accent-soft)',border:'1px solid var(--accent)',borderRadius:10,padding:'8px 12px',marginBottom:12}}>
          <span style={{fontSize:12,color:'var(--accent)'}}>La hora ingresada es igual o posterior a tu hora de salida</span>
        </div>}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Motivo *</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {MOTIVOS.map(m=>(
              <span key={m} onClick={()=>setMotivo(m)} style={{background:motivo===m?'var(--accent-soft)':'var(--canvas)',color:motivo===m?'var(--accent)':'var(--muted)',border:`1px solid ${motivo===m?'var(--accent)':'var(--line)'}`,borderRadius:99,padding:'4px 12px',fontSize:12,cursor:'pointer'}}>{m}</span>
            ))}
          </div>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>Detalle (opcional)</div>
          <textarea className="note-input" value={detalle} onChange={e=>setDetalle(e.target.value)} placeholder="Cita médica a las 16:00..."/>
        </div>
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{width:'auto',padding:'10px 22px'}} onClick={save} disabled={!motivo||faltaMin<=0}>Registrar</button>
        </div>
      </div>
    </div>
  );
}

// ── VACACIONES MODAL ──────────────────────────────────────────
function VacacionesModal({records, onClose, onSave, userId}){
  const [desde, setDesde] = React.useState('');
  const [hasta, setHasta] = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const DIAS_ANUALES = 30;
  
  // Count used vacation days from records
  const diasUsados = Object.values(records).filter(r=>r.vacacion).length;
  const diasDisponibles = DIAS_ANUALES - diasUsados;
  
  // Calculate days in range (calendar days)
  const calcDiasRango = () => {
    if(!desde||!hasta) return 0;
    const d1 = new Date(desde); const d2 = new Date(hasta);
    if(d2<d1) return 0;
    return Math.round((d2-d1)/(1000*60*60*24))+1;
  };
  
  // Calculate workdays in range (to subtract from monthly goal)
  const calcDiasLaborablesRango = () => {
    if(!desde||!hasta) return 0;
    const d1 = new Date(desde); const d2 = new Date(hasta);
    let count=0;
    for(let d=new Date(d1); d<=d2; d.setDate(d.getDate()+1)){
      if(isWorkday(new Date(d))) count++;
    }
    return count;
  };
  
  const diasRango = calcDiasRango();
  const diasLaborables = calcDiasLaborablesRango();
  const puedeGuardar = desde && hasta && diasRango>0 && diasRango<=diasDisponibles;
  
  const save = async () => {
    if(!puedeGuardar) return;
    setLoading(true);
    const d1 = new Date(desde + 'T00:00:00'); const d2 = new Date(hasta + 'T00:00:00');
    const upserts = [];
    for(let d=new Date(d1); dateKey(d)<=dateKey(d2); d.setDate(d.getDate()+1)){
      const k = dateKey(new Date(d));
      // Skip today and days that already have entry/exit records
      const today = dateKey(new Date());
      if(k === today) continue;
      if(records[k]?.entry!=null || records[k]?.exit!=null) continue;
      upserts.push({
        user_id: userId,
        fecha: k,
        entrada_min: null,
        salida_min: null,
        nota: 'Vacaciones',
        feriado: null,
        vacacion: true,
      });
    }
    if(upserts.length > 0){
      const {error} = await supabase.from('asistencia').upsert(upserts, {onConflict:'user_id,fecha'});
      if(!error) onSave(upserts);
    } else {
      onSave([]);
    }
    setLoading(false);
    onClose();
  };
  
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <h2>Vacaciones<small>Registra tus días de descanso</small></h2>
          <button className="modal-x" onClick={onClose}>✕</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
          <div style={{background:'var(--accent-soft)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'.06em'}}>Disponibles</div>
            <div style={{fontFamily:'Geist Mono,monospace',fontSize:24,fontWeight:500,color:'var(--accent)',marginTop:2}}>{diasDisponibles}</div>
            <div style={{fontSize:10,color:'var(--accent)'}}>días</div>
          </div>
          <div style={{background:'var(--canvas)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Usados</div>
            <div style={{fontFamily:'Geist Mono,monospace',fontSize:24,fontWeight:500,color:'var(--ink)',marginTop:2}}>{diasUsados}</div>
            <div style={{fontSize:10,color:'var(--muted)'}}>días</div>
          </div>
          <div style={{background:'var(--canvas)',borderRadius:10,padding:'10px 12px',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.06em'}}>Total año</div>
            <div style={{fontFamily:'Geist Mono,monospace',fontSize:24,fontWeight:500,color:'var(--ink)',marginTop:2}}>{DIAS_ANUALES}</div>
            <div style={{fontSize:10,color:'var(--muted)'}}>días</div>
          </div>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:6,textTransform:'uppercase',letterSpacing:'.06em'}}>Período de vacaciones</div>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:3}}>Desde</div>
              <input className="time-input" type="date" value={desde} onChange={e=>setDesde(e.target.value)} style={{fontSize:13}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:10,color:'var(--muted)',marginBottom:3}}>Hasta</div>
              <input className="time-input" type="date" value={hasta} onChange={e=>setHasta(e.target.value)} style={{fontSize:13}}/>
            </div>
          </div>
        </div>
        {diasRango>0&&(
          <div style={{background:'var(--canvas)',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:12,color:'var(--muted)'}}>Días de vacaciones (calendario)</span>
              <span style={{fontFamily:'Geist Mono,monospace',fontSize:13,fontWeight:500,color:'var(--ink)'}}>{diasRango} días</span>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:12,color:'var(--muted)'}}>Días hábiles incluidos</span>
              <span style={{fontFamily:'Geist Mono,monospace',fontSize:13,color:'var(--muted)'}}>{diasLaborables} días</span>
            </div>
            <div style={{height:'0.5px',background:'var(--line-2)',margin:'8px 0'}}>
            </div>
            <div style={{display:'flex',justifyContent:'space-between'}}>
              <span style={{fontSize:12,color:'var(--muted)'}}>Días restantes después</span>
              <span style={{fontFamily:'Geist Mono,monospace',fontSize:13,fontWeight:500,color:diasDisponibles-diasRango>=0?'var(--accent)':'var(--late)'}}>{diasDisponibles-diasRango} días</span>
            </div>
          </div>
        )}
        {diasRango>diasDisponibles&&<div style={{background:'var(--late-soft)',border:'1px solid var(--late)',borderRadius:10,padding:'8px 12px',marginBottom:12,fontSize:12,color:'var(--late)'}}>
          No tienes suficientes días disponibles ({diasDisponibles} días restantes)
        </div>}
        <div className="modal-actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" style={{width:'auto',padding:'10px 22px'}} onClick={save} disabled={!puedeGuardar||loading}>
            {loading?'Guardando...':'Registrar vacaciones'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[authLoading,setAuthLoading]=useState(true);
  const[records,setRecords]=useState({});
  const[syncStatus,setSyncStatus]=useState('ok'); // ok | syncing | error
  const[userSchedule,setUserSchedule]=useState(null);
  const[showScheduleSetup,setShowScheduleSetup]=useState(false);
  const[showSalidaAnticipada,setShowSalidaAnticipada]=useState(false);
  const[showVacaciones,setShowVacaciones]=useState(false);
  const[now,setNow]=useState(()=>new Date());
  const[viewMonth,setViewMonth]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const[selected,setSelected]=useState(null);
  const[historyFilter,setHistoryFilter]=useState('week');
  const[exportOpen,setExportOpen]=useState(false);
  const _start = userSchedule?.scheduleStart||'08:00';
  const _end = userSchedule?.scheduleEnd||'17:45';
  const _lunch = userSchedule?.lunchMin||45;
  const _dailyGoalMin = parseHM(_end) - parseHM(_start) - _lunch;
  const cfg={
    scheduleStart: _start,
    scheduleEnd: _end,
    lunchMin: _lunch,
    weeklyGoal: Math.round((_dailyGoalMin/60)*5*10)/10,
    dailyGoal: _dailyGoalMin/60
  };
  const todayKey=dateKey(now);
  const nowMin=now.getHours()*60+now.getMinutes();
  const todayRec=records[todayKey];
  const todayCalc=calcDay(todayRec,cfg,nowMin);
  const week=useMemo(()=>calcWeek(records,now,cfg,nowMin),[records,now,nowMin]);

  // Auth listener
  useEffect(()=>{
    supabase = getSupabase();
    if(!supabase)return;
    supabase.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user??null);
      setAuthLoading(false);
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user??null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // Load schedule when user logs in
  useEffect(()=>{
    if(!user||!supabase)return;
    const loadSchedule=async()=>{
      const{data,error}=await supabase.from('empleados').select('*').eq('user_id',user.id).single();
      if(error||!data){setShowScheduleSetup(true);}
      else{setUserSchedule({scheduleStart:data.schedule_start,scheduleEnd:data.schedule_end,lunchMin:data.lunch_min,turnoId:data.turno_id});}
    };
    loadSchedule();
  },[user]);

  // Load records from Supabase when user logs in
  useEffect(()=>{
    if(!user||!supabase)return;
    const load=async()=>{
      const{data,error}=await supabase.from('asistencia').select('*').eq('user_id',user.id);
      if(error){console.error(error);return;}
      const map={};
      data.forEach(row=>{
        map[row.fecha]={
          entry:row.entrada_min,
          exit:row.salida_min,
          note:row.nota||undefined,
          holiday:row.feriado||undefined,
          vacacion:row.vacacion||false,
          earlyExit:row.early_exit||false,
        };
      });
      setRecords(map);
    };
    load();
  },[user]);

  // Clock
  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id);},[]);

  // Save record to Supabase
  const saveRecord=async(fecha,data)=>{
    if(!supabase||!user)return;
    setSyncStatus('syncing');
    const upsertData={user_id:user.id,fecha,entrada_min:data.entry??null,salida_min:data.exit??null,nota:data.note??null,feriado:data.holiday??null,vacacion:data.vacacion??false,early_exit:data.earlyExit??false};
    const{error}=await supabase.from('asistencia').upsert(upsertData,{onConflict:'user_id,fecha'});
    setSyncStatus(error?'error':'ok');
    if(error)console.error('Error guardando:',error);
  };

  const deleteRecord=async(fecha)=>{
    if(!supabase||!user)return;
    setSyncStatus('syncing');
    const{error}=await supabase.from('asistencia').delete().eq('user_id',user.id).eq('fecha',fecha);
    setSyncStatus(error?'error':'ok');
  };

  const markEntry=()=>{
    if(todayRec?.entry!=null)return;
    if(todayRec?.vacacion){
      if(!window.confirm('Este día está marcado como vacación. ¿Deseas registrar asistencia y cancelar la vacación?')) return;
      deleteRecord(todayKey);
    }
    const updated={entry:nowMin,vacacion:false};
    setRecords(r=>({...r,[todayKey]:updated}));
    saveRecord(todayKey,updated);
  };
  const markExit=()=>{
    if(todayRec?.entry==null)return;
    const updated={...(records[todayKey]||{}),exit:nowMin};
    setRecords(r=>({...r,[todayKey]:updated}));
    saveRecord(todayKey,updated);
  };
  const undoExit=()=>{
    const updated={...(records[todayKey]||{}),exit:null};
    setRecords(r=>({...r,[todayKey]:updated}));
    saveRecord(todayKey,updated);
  };
  
  const handleSalidaAnticipada=(data)=>{
    const updated={...(records[todayKey]||{}),...data};
    setRecords(r=>({...r,[todayKey]:updated}));
    saveRecord(todayKey,updated);
  };
  
  const handleVacaciones=(upserts)=>{
    const newRecords={...records};
    upserts.forEach(u=>{
      // Only set vacation if day has no existing entry/exit record and is not today
      const todayK = dateKey(new Date());
      if(u.fecha !== todayK && !newRecords[u.fecha]?.entry && !newRecords[u.fecha]?.exit){
        newRecords[u.fecha]={entry:null,exit:null,note:'Vacaciones',vacacion:true};
      }
    });
    setRecords(newRecords);
  };
  const updateRecord=(k,patch)=>{
    const updated={...(records[k]||{}),...patch};
    setRecords(r=>({...r,[k]:updated}));
    saveRecord(k,updated);
  };
  const clearRecord=(k)=>{
    setRecords(r=>{const{[k]:_,...rest}=r;return rest;});
    deleteRecord(k);
  };

  const downloadFile=(filename,content,mime)=>{
    const blob=new Blob([content],{type:mime});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
  };
  const exportCSV=(scope)=>{
    const headers=['Fecha','Día','Entrada','Salida','Horas trabajadas','Tardanza (min)','Extras día (min)','Nota'];
    let entries=Object.entries(records).map(([k,rec])=>({k,rec,date:fromKey(k)})).sort((a,b)=>a.k.localeCompare(b.k));
    if(scope==='month')entries=entries.filter(({date})=>date.getFullYear()===viewMonth.y&&date.getMonth()===viewMonth.m);
    else if(scope==='week'){const ws=weekStart(now);const we=new Date(ws.getFullYear(),ws.getMonth(),ws.getDate()+7);entries=entries.filter(({date})=>date>=ws&&date<we);}
    const rows=entries.map(({k,rec,date})=>{const calc=calcDay(rec,cfg,nowMin);return[k,DAY_FULL[date.getDay()],rec.entry!=null?fmtHM(rec.entry):'',rec.exit!=null?fmtHM(rec.exit):'',calc?fmtHrs(calc.worked,{short:true}):'',calc?calc.tard:'',calc?calc.dailyOver:'',(rec.note||'').replace(/"/g,'""')];});
    const csv='\ufeff'+[headers,...rows].map(r=>r.map(c=>{const s=String(c??'');return/[",;\n]/.test(s)?`"${s}"`:s;}).join(';')).join('\r\n');
    downloadFile(`asistencia-${scope}.csv`,csv,'text/csv;charset=utf-8');
  };
  const exportPDF=()=>{document.body.classList.add('printing');setTimeout(()=>{window.print();setTimeout(()=>document.body.classList.remove('printing'),500);},100);};
  const handleLogout=()=>{if(supabase)supabase.auth.signOut();setRecords({});setUser(null);};

  if(!isConfigured)return<ConfigScreen/>;
  if(authLoading)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontFamily:'Geist,sans-serif'}}>Cargando...</div>;
  if(!user)return<LoginScreen onLogin={setUser}/>;
  if(showScheduleSetup)return<ScheduleSetup user={user} currentSchedule={{...userSchedule,turnoId:userSchedule?.turnoId}} onSave={(s)=>{setUserSchedule({scheduleStart:s.schedule_start,scheduleEnd:s.schedule_end,lunchMin:s.lunch_min,turnoId:s.turno_id});setShowScheduleSetup(false);}}/>;
  if(!userSchedule)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontFamily:'Geist,sans-serif'}}>Cargando horario...</div>;

  return(
    <div className="app">
      <Topbar now={now} user={user} syncStatus={syncStatus} exportOpen={exportOpen} setExportOpen={setExportOpen} onExportCSV={exportCSV} onExportPDF={exportPDF} onLogout={handleLogout} onEditSchedule={()=>setShowScheduleSetup(true)}/>
      <div className="grid">
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          <TodayCard now={now} todayRec={todayRec} todayCalc={todayCalc} cfg={cfg} nowMin={nowMin} onMarkEntry={markEntry} onMarkExit={markExit} onUndoExit={undoExit} onSalidaAnticipada={()=>setShowSalidaAnticipada(true)} onVacaciones={()=>setShowVacaciones(true)}/>
          <WeekCard week={week} cfg={cfg}/>
          <HistoryCard records={records} cfg={cfg} nowMin={nowMin} todayKey={todayKey} filter={historyFilter} onFilter={setHistoryFilter} anchor={now} month={viewMonth} onPick={setSelected}/>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:18}}>
          <MonthCalendar records={records} cfg={cfg} nowMin={nowMin} todayKey={todayKey} viewMonth={viewMonth} onSetViewMonth={setViewMonth} onPick={setSelected} selected={selected}/>
          <MonthSummary records={records} cfg={cfg} nowMin={nowMin} todayKey={todayKey} viewMonth={viewMonth}/>
        </div>
      </div>
      {selected&&(
        <DayDetailModal dateKey={selected} rec={records[selected]} cfg={cfg} nowMin={nowMin} todayKey={todayKey} onClose={()=>setSelected(null)} onUpdate={(patch)=>updateRecord(selected,patch)} onClear={()=>{clearRecord(selected);setSelected(null);}}/>
      )}
      {showSalidaAnticipada&&(
        <SalidaAnticipadaModal cfg={cfg} nowMin={nowMin} onClose={()=>setShowSalidaAnticipada(false)} onSave={handleSalidaAnticipada}/>
      )}
      {showVacaciones&&(
        <VacacionesModal records={records} onClose={()=>setShowVacaciones(false)} onSave={handleVacaciones} userId={user?.id}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
